name: Build Android APK

on:
  # Run on every push to main / master and on PRs
  push:
    branches: [main, master]
    paths:
      - 'RunningParaCojos/**'
      - 'Dockerfile'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'RunningParaCojos/**'
      - 'Dockerfile'
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug | release)'
        required: false
        default: 'debug'

env:
  # Increment this key to bust the Gradle / npm caches
  CACHE_VERSION: v1

jobs:
  build-apk:
    name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: RunningParaCojos/package-lock.json

      # ── 3. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & platform
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      # ── 5. npm install ───────────────────────────────────────────────────────
      - name: Install JS dependencies
        working-directory: RunningParaCojos
        run: npm ci

      # ── 6. expo prebuild ─────────────────────────────────────────────────────
      - name: Generate native Android project (expo prebuild)
        working-directory: RunningParaCojos
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: npx expo prebuild --platform android --no-install --clean

      # ── 7. Cache Gradle ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.CACHE_VERSION }}-gradle-${{ hashFiles('RunningParaCojos/android/**/*.gradle*', 'RunningParaCojos/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-gradle-

      # ── 8. Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: RunningParaCojos/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 9. Build release APK (unsigned) ─────────────────────────────────────
      # To sign the release APK, set these repository secrets:
      #   KEYSTORE_BASE64   — base64-encoded .jks keystore
      #   KEY_ALIAS         — key alias
      #   KEY_PASSWORD      — key password
      #   STORE_PASSWORD    — keystore password
      - name: Build release APK (unsigned)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: RunningParaCojos/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 10. Upload APK artifact ──────────────────────────────────────────────
      - name: Upload debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: running-para-cojos-debug-${{ github.run_number }}
          path: RunningParaCojos/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: running-para-cojos-release-${{ github.run_number }}
          path: RunningParaCojos/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # ── 11. Print APK info ───────────────────────────────────────────────────
      - name: Show APK details
        run: |
          echo "===== APK build complete ====="
          find RunningParaCojos/android/app/build/outputs/apk -name "*.apk" \
            -exec echo "  {}" \; \
            -exec ls -lh {} \;
